---
layout: default
---

<div class="post">

  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    <p class="post-meta">{{ page.date | date: "%b %-d, %Y" }}{% if
    page.categories %} • {{ page.categories }}{% endif %}{% if page.meta %} • {{ page.meta }}{% endif %} • tags: <span class="post_meta">{% for tag in page.tags %}<a href="/tags/#{{ tag }}">{{ tag }}</a>{% if forloop.last != true %}, {% endif %}{% endfor %}</span></p>
  </header>

  <article class="post-content">
    {{ content }}
  </article>

  <script src="https://cdn.mathjax.org/mathjax/latest/MathJax.js?config=TeX-AMS-MML_HTMLorMML" type="text/javascript"></script>

</div>
