---
layout: default
---

<header class="post-header">
  <h1 class="post-title">{{ page.title }}</h1>
  <p class="post-meta">{{ page.date | date: "%b %-d, %Y" }}{% if
  page.categories %} • {{ page.categories }}{% endif %}{% if page.meta %} • {{ page.meta }}{% endif %} • tags: <span class="post_meta">{% for tag in page.tags %}<a href="/tags/#{{ tag }}">{{ tag }}</a>{% if forloop.last != true %}, {% endif %}{% endfor %}</span></p>
</header> 

<div class="post-container">

  <div class="progress-bar-container">
    <div class="progress-bar-container__progress"></div>
  </div>
   
  <article class="post-content">
  
    {{ content }}

  </article>

</div>


<script src="{{ "/js/progress_bar.js" | prepend: site.baseurl }}"></script>
